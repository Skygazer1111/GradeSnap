<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GradeSnap — Private AI-Powered CGPA Calculator</title>
  <meta name="description" content="Upload a gradesheet image and GradeSnap calculates your CGPA entirely in your browser. OCR and scoring happen locally — your grades never leave your device." />
  <meta name="author" content="GradeSnap" />
  <meta name="theme-color" content="#0f1626" />
  <meta property="og:title" content="GradeSnap — Private CGPA Calculator" />
  <meta property="og:description" content="Private, in-browser CGPA calculation. Your grades never leave your device." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <script>
    // Apply saved theme before first paint to prevent flash
    (function(){try{var t=localStorage.getItem('gradesnap-theme');if(t&&['light','dark','crimson'].indexOf(t)>=0){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/app/main.tsx"></script>
</body>
</html>
